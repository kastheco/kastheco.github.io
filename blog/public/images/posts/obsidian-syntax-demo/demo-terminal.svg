<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" width="560" height="200" role="img" aria-label="Terminal output demo">
  <!-- rosé pine moon palette: base #232136, text #e0def4, pine #3e8fb0, gold #f6c177, iris #c4a7e7 -->
  <rect width="560" height="200" rx="8" fill="#232136"/>
  <!-- title bar -->
  <rect width="560" height="32" rx="8" fill="#2a273f"/>
  <rect y="24" width="560" height="8" fill="#2a273f"/>
  <!-- traffic lights -->
  <circle cx="20" cy="16" r="6" fill="#eb6f92"/>
  <circle cx="40" cy="16" r="6" fill="#f6c177"/>
  <circle cx="60" cy="16" r="6" fill="#9ccfd8"/>
  <!-- title -->
  <text x="280" y="21" font-family="monospace" font-size="12" fill="#6e6a86" text-anchor="middle">~/dev/kastheco.github.io</text>
  <!-- prompt line 1 -->
  <text x="16" y="64" font-family="monospace" font-size="13" fill="#3e8fb0">❯</text>
  <text x="32" y="64" font-family="monospace" font-size="13" fill="#e0def4">npm run build</text>
  <!-- output -->
  <text x="16" y="88" font-family="monospace" font-size="12" fill="#6e6a86">▶ astro build</text>
  <text x="16" y="108" font-family="monospace" font-size="12" fill="#9ccfd8">  collecting content...</text>
  <text x="16" y="126" font-family="monospace" font-size="12" fill="#9ccfd8">  building pages...</text>
  <text x="16" y="144" font-family="monospace" font-size="12" fill="#c4a7e7">  ✓  2 posts collected</text>
  <text x="16" y="162" font-family="monospace" font-size="12" fill="#c4a7e7">  ✓  dist/ ready</text>
  <!-- prompt line 2 -->
  <text x="16" y="186" font-family="monospace" font-size="13" fill="#3e8fb0">❯</text>
  <text x="32" y="186" font-family="monospace" font-size="13" fill="#e0def4 ">█</text>
</svg>
