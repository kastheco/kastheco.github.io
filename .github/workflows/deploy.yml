name: deploy to github pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: blog/package-lock.json
      - name: install blog deps
        run: npm ci
        working-directory: blog
      - name: build blog
        run: npm run build
        working-directory: blog
      - name: stage combined site
        run: |
          rm -rf _site
          mkdir -p _site/blog
          cp index.html 404.html robots.txt CNAME favicon.ico icon-192.png icon-512.png apple-touch-icon.png .nojekyll _site/
          cp -R blog/dist/. _site/blog/
          test -f _site/.nojekyll
          test -f _site/blog/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
